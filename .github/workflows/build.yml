name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create google-services.json
        run: |
          cat > app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "lumina-dummy",
              "storage_bucket": "lumina-dummy.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.project.lumina.client" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "dummy" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          JSON

      - name: Build Debug APK
        run: ./gradlew :app:compileDebugKotlin --no-daemon --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
